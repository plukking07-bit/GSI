services:
  db:
    image: postgres:latest
    container_name: gis_database
    environment:
      POSTGRES_DB: gis_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  # web:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db

volumes:
  postgres_data:
  redis-data:
networks:
  gsi-network:
    driver: bridge
